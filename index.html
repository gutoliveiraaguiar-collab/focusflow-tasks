<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow Tasks - Gerenciador de Tarefas</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>    
       <!-- ==================== NAVBAR ==================== -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="#">
                <i class="bi bi-check2-square"></i> FocusFlow Tasks
            </a>
            <div class="ms-auto">
                <span class="badge bg-success" id="task-counter">0 tarefas</span>
            </div>
        </div>
    </nav>
    <!-- ==================== CONTEÚDO PRINCIPAL ==================== -->
     <main class="container mt-5 pt-3">
        <div class="row justify-content-center">
            <div class="col-lg-8">
             <!-- CARD DE ADICIONAR TAREFA -->   
              <div class="card shadow-sm border-0 mb-4"> 
                <div class="card-body p-4">
                    <h5 class="card-title mb-3 fw-bold">
                        <i class="bi bi-plus-circle text-success"></i> Nova Tarefa
                    </h5>
                    <div class="input-group">
                        <input type="text" class="form-control form-control-lg" id="task-input" placeholder="O que você precisa fazer hoje?" aria-label="Nova tarefa" autocomplete="off">
                        <button class="btn btn-success btn-lg" id="add-task-btn" type="button">
                            <i class="bi bi-plus-lg"></i> Adicionar
                        </button>
                    </div>
                </div>
              </div>
              <!-- LISTA DE TAREFAS -->
               <div class="card shadow-sm border-0">
                <div class="card-header bg-white p-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold">
                        <i class="bi bi-list-check text-success"></i> Minhas Tarefas
                    </h5>
                    <button class="btn btn-outline-danger btn-sm" id="clear-all-btn">
                        <i class="bi bi-trash"></i> Limpar Concluídas
                    </button>
                </div>
                <div class="card-body p-0">
                    <div id="task-list" class="p-3">
                        <div id="empty-message" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1"></i><br>
                            Nenhuma tarefa ainda. Adicione uma acima!
                        </div>
                    </div>
                </div>
            </div>
            <p class="text-center text-muted mt-3 small">
                <i class="bi bi-info-circle"></i> Clique no texto para marcar como Concluída
            </p>
            </div>
        </div>
     </main> 
     <!-- Bootstrap JS -->
         <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
         
         <!-- JavaScript Customizado -->
         <script src="app.js"></script>
</body>
</html>
